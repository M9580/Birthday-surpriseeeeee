<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #ffe3e3 0%, #ffd1d1 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        #password-screen { text-align: center; background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 90%; width: 400px; z-index: 10; }
        #password-screen h2 { color: #ff4d6d; margin-bottom: 20px; font-size: 1.5rem; }
        #password-screen input { width: 100%; padding: 12px; border: 2px solid #ffa6b6; border-radius: 25px; outline: none; font-size: 1rem; text-align: center; margin-bottom: 15px; }
        #password-screen button { background: #ff4d6d; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1rem; cursor: pointer; font-weight: 600; width: 100%; }
        #error-msg { color: red; font-size: 0.9rem; margin-top: 10px; display: none; }
        #main-content { display: none; width: 100%; max-width: 600px; padding: 20px; text-align: center; }
        .heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .floating-heart { position: absolute; color: #ff4d6d; opacity: 0.6; animation: floatUp 4s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
        .letter-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .letter-box h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #ff4d6d; }
        .letter-text { font-size: 1.1rem; line-height: 1.8; color: #555; margin-top: 20px; text-align: justify; }
        .gallery-title { color: #ff4d6d; margin: 20px 0; font-size: 1.5rem; }
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .gallery img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 4px solid white; }
        .gift-btn { background: #ff4d6d; color: white; border: none; padding: 15px 35px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @media (max-width: 480px) { .letter-box h1 { font-size: 2.8rem; } .gallery { grid-template-columns: 1fr; } .gallery img { height: 220px; } }
    </style>
</head>
<body>
    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <div id="password-screen">
        <h2>🔒 Enter the Secret Code to Unlock Your Surprise</h2>
        <input type="password" id="password-input" placeholder="Hint: Your Birthday (DDMM)">
        <button onclick="checkPassword()">Unlock ❤️</button>
        <p id="error-msg">Galat password! Try again 😉</p>
    </div>
    <div class="heart-bg" id="heart-container"></div>
    <div id="main-content">
        <div class="letter-box">
            <h1>Happy Birthday! ✨</h1>
            <p class="letter-text">Happy Birthday to you! ❤️ I hope this tiny digital surprise brings a huge smile to your face. You deserve all the happiness in the world!</p>
        </div>
        <h3 class="gallery-title">Memories 📸</h3>
        <div class="gallery">
            <img src="https://picsum.photos/400/400?random=1" alt="1">
            <img src="https://picsum.photos/400/400?random=2" alt="2">
        </div>
        <div style="margin-top: 40px; margin-bottom: 50px;">
            <button class="gift-btn" onclick="triggerSurprise()">Click For Final Surprise! 🎁</button>
        </div>
    </div>
    <script>
        function checkPassword() {
            const passwordInput = document.getElementById('password-input').value;
            const correctPassword = "1203"; // <-- Password yahan hai (1203)
            if (passwordInput === correctPassword) {
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('bg-music').play().catch(e => console.log("Music blocked"));
                setInterval(createHeart, 300);
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            } else { document.getElementById('error-msg').style.display = 'block'; }
        }
        function createHeart() {
            const container = document.getElementById('heart-container'); if(!container) return;
            const heart = document.createElement('div'); heart.classList.add('floating-heart'); heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px'; container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        function triggerSurprise() {
            var duration = 3 * 1000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
            alert("Happy Birthday! 🎉❤️");
        }
    </script>
</body>
  </html>
